{% extends 'base.html' %}{% block title %}Marques - Tableau de Bord{% endblock %}{% block content %}
<div class="min-h-screen bg-slate-100">
<div class="bg-slate-900 text-white py-4 sticky top-0 z-40">
<div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
<h1 class="text-xl font-bold">Marques</h1>
<div class="flex items-center gap-4">
<a href="{% url 'dashboard:home' %}" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm transition">Tableau de bord</a>
<a href="{% url 'dashboard:brand_create' %}" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-medium transition">+ Ajouter</a>
</div>
</div>
</div>
<div class="max-w-7xl mx-auto px-4 py-8">
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
<table class="w-full">
<thead class="bg-slate-50 border-b border-slate-200"><tr><th class="text-left py-3 px-4 text-sm font-medium text-slate-700">Nom</th><th class="text-left py-3 px-4 text-sm font-medium text-slate-700">Voitures</th><th class="text-right py-3 px-4 text-sm font-medium text-slate-700">Actions</th></tr></thead>
<tbody class="divide-y divide-slate-100">
{% for brand in brands %}
<tr class="hover:bg-slate-50 transition">
<td class="py-3 px-4 font-medium">{{ brand.name }}</td>
<td class="py-3 px-4">{{ brand.rentalcars.count }}</td>
<td class="py-3 px-4 text-right"><a href="{% url 'dashboard:brand_edit' brand.pk %}" class="text-blue-600 hover:text-blue-700 font-medium text-sm mr-4">Modifier</a><a href="{% url 'dashboard:brand_delete' brand.pk %}" class="text-red-600 hover:text-red-700 font-medium text-sm">Supprimer</a></td>
</tr>
{% empty %}
<tr><td colspan="3" class="py-8 text-center text-slate-500">Aucune marque</td></tr>
{% endfor %}
</tbody>
</table>
</div>
</div>
</div>
{% endblock %}
