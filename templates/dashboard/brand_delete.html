{% extends 'base.html' %}{% block title %}Supprimer {{ brand.name }}{% endblock %}{% block content %}
<div class="bg-slate-900 text-white py-4 sticky top-0 z-40">
<div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
<h1 class="text-xl font-bold">Supprimer</h1>
<div class="flex items-center gap-4">
<a href="{% url 'dashboard:home' %}" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm transition">Tableau de bord</a>
<a href="{% url 'dashboard:brand_list' %}" class="text-slate-300 hover:text-white text-sm">Retour</a>
</div>
</div>
</div>
<div class="min-h-screen bg-slate-100 py-12">
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8 text-center">
<svg class="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
<h1 class="text-xl font-bold mb-2">Confirmer la suppression</h1>
<p class="text-slate-600 mb-6">Supprimer <strong>{{ brand.name }}</strong> ?</p>
<form method="post" class="flex gap-4">
{% csrf_token %}
<button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-medium">Supprimer</button>
<a href="{% url 'dashboard:brand_list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg font-medium text-center">Annuler</a>
</form>
</div>
</div>
{% endblock %}
